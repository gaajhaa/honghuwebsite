<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 鸿鹄国际旅行社</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0A2463 0%, #3E92CC 100%); }
        .login-container { background: #fff; padding: 3rem; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); width: 100%; max-width: 400px; margin: 1rem; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #0A2463; font-size: 1.8rem; }
        .logo span { color: #E94560; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: #333; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s ease; }
        .form-group input:focus { outline: none; border-color: #0A2463; }
        .remember { display: flex; align-items: center; margin-bottom: 1.5rem; }
        .remember input { margin-right: 0.5rem; }
        .remember label { color: #666; font-size: 0.9rem; }
        .login-btn { width: 100%; padding: 14px; background: #0A2463; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s ease; }
        .login-btn:hover { background: #0d3377; }
        .error { color: #E94560; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: #0A2463; text-decoration: none; font-size: 0.9rem; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1><span>鸿鹄</span>后台管理系统</h1>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">记住密码</label>
            </div>
            <div class="error" id="errorMsg">用户名或密码错误</div>
            <button type="submit" class="login-btn">登录</button>
        </form>
        <div class="back-link">
            <a href="index.html">← 返回官网首页</a>
        </div>
    </div>

    <script>
        // 默认管理员账号
        const DEFAULT_ADMIN = { username: 'admin', password: 'admin123' };

        // 获取存储的管理员信息
        function getAdminCredentials() {
            const stored = localStorage.getItem('hh_admin');
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    return DEFAULT_ADMIN;
                }
            }
            return DEFAULT_ADMIN;
        }

        // 保存管理员信息
        function saveAdminCredentials(creds) {
            localStorage.setItem('hh_admin', JSON.stringify(creds));
        }

        // 检查是否已登录
        function checkLogin() {
            const session = localStorage.getItem('hh_admin_session');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (data.expiresAt > Date.now()) {
                        window.location.href = 'admin.html';
                        return true;
                    }
                } catch (e) {}
            }
            return false;
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            const admin = getAdminCredentials();
            
            if (username === admin.username && password === admin.password) {
                // 登录成功
                const session = {
                    username: username,
                    token: Date.now().toString(),
                    expiresAt: Date.now() + (7 * 24 * 60 * 60 * 1000) // 7天有效期
                };
                localStorage.setItem('hh_admin_session', JSON.stringify(session));
                
                // 如果记住密码，保存凭证
                if (document.getElementById('remember').checked) {
                    saveAdminCredentials({ username, password });
                }
                
                errorMsg.style.display = 'none';
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });

        // 页面加载时检查
        checkLogin();
    </script>
</body>
</html>
